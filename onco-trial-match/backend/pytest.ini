[pytest]
# pytest-asyncio needs explicit mode configuration, otherwise every
# `async def test_*` function in this suite (most of them — almost all
# app code is async) fails to collect properly with a confusing error
# rather than actually running.
asyncio_mode = auto

# Quieter, more readable output: show each test name, summarize warnings
# once instead of repeating per-test (deprecation warnings from
# dependencies like chromadb/pydantic are common and not actionable here).
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning